<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频片尾模板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画粒子 */
        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1080px) translateX(100px); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 感谢文字 */
        .thank-you {
            font-size: 96px;
            font-weight: 900;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            letter-spacing: 12px;
            text-shadow: 0 0 60px rgba(99, 102, 241, 0.5);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* 引导文字 */
        .cta-text {
            font-size: 42px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 60px;
            letter-spacing: 4px;
            animation: fadeInUp 1.2s ease-out 0.3s both;
        }

        /* 内容区（二维码 + 链接） */
        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            animation: fadeInUp 1.2s ease-out 0.6s both;
        }

        /* 二维码容器 */
        .qr-container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
            transition: transform 0.3s ease;
        }

        .qr-container:hover {
            transform: scale(1.05);
        }

        .qr-code {
            width: 280px;
            height: 280px;
            display: block;
        }

        .qr-label {
            margin-top: 16px;
            font-size: 24px;
            color: #6366f1;
            font-weight: 600;
        }

        /* 链接区 */
        .link-container {
            text-align: left;
        }

        .website-label {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
        }

        .website-url {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* 社交图标 */
        .social-links {
            display: flex;
            gap: 24px;
            margin-top: 40px;
        }

        .social-icon {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-icon:hover {
            background: rgba(99, 102, 241, 0.6);
            border-color: #6366f1;
            transform: translateY(-4px);
        }

        /* 底部提示 */
        .footer-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            animation: fadeInUp 1.2s ease-out 0.9s both;
        }

        /* 呼吸动画（循环提示） */
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>

    <!-- 主内容 -->
    <div class="container">
        <div class="thank-you">感谢观看</div>
        <div class="cta-text">🎮 更多精彩内容，访问我的网站 👇</div>
        
        <div class="content">
            <!-- 二维码 -->
            <div class="qr-container pulse">
                <img src="qrcode.png" alt="网站二维码" class="qr-code">
                <div class="qr-label">扫码访问</div>
            </div>

            <!-- 网站链接 -->
            <div class="link-container">
                <div class="website-label">🌐 个人网站</div>
                <div class="website-url">pengpp0424.github.io</div>
                
                <div class="website-label" style="margin-top: 40px;">📱 关注我</div>
                <div class="social-links">
                    <div class="social-icon" title="B站">B</div>
                    <div class="social-icon" title="抖音">抖</div>
                    <div class="social-icon" title="快手">快</div>
                    <div class="social-icon" title="小红书">红</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部提示 -->
    <div class="footer-hint">记得点赞 👍 收藏 ⭐ 关注 ➕</div>

    <script>
        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (6 + Math.random() * 4) + 's';
            const size = 2 + Math.random() * 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particlesContainer.appendChild(particle);
        }

        // 动态更新二维码（如果未来需要）
        console.log('🎬 片尾模板已加载');
        console.log('📱 二维码路径: qrcode.png');
        console.log('🔗 网站链接: https://pengpp0424.github.io');
    </script>
</body>
</html>
