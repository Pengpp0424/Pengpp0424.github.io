<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频片尾 - 老鹏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }

        .outro-container {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 50%, #0a1a2e 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 背景粒子动画 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.8);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) translateX(50px);
                opacity: 0;
            }
        }

        /* 主标题 */
        .thank-you {
            font-size: 120px;
            font-weight: 900;
            color: transparent;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff2d95);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradient-shift 3s ease-in-out infinite, fade-in-up 1s ease-out;
            margin-bottom: 60px;
            letter-spacing: 15px;
            text-shadow: 0 0 80px rgba(0, 212, 255, 0.5);
        }

        @keyframes gradient-shift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 域名链接 */
        .domain-link {
            font-size: 72px;
            color: #00d4ff;
            text-decoration: none;
            margin: 40px 0;
            padding: 20px 60px;
            border: 3px solid rgba(0, 212, 255, 0.5);
            border-radius: 20px;
            transition: all 0.3s ease;
            animation: fade-in 1.5s ease-out 0.5s both, glow-pulse 2s ease-in-out infinite;
            display: inline-block;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .domain-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .domain-link:hover::before {
            left: 100%;
        }

        .domain-link:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            transform: scale(1.05);
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            }
        }

        /* 行动号召 */
        .cta {
            font-size: 56px;
            color: #ffffff;
            margin-top: 60px;
            animation: fade-in 2s ease-out 1s both;
            display: flex;
            gap: 40px;
            letter-spacing: 8px;
        }

        .cta-item {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .cta-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
            transform: translateY(-5px);
        }

        .emoji {
            display: inline-block;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* 扫描线效果 */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            from {
                top: -2px;
            }
            to {
                top: 100%;
            }
        }

        /* Logo 装饰 */
        .logo-decor {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .logo-decor::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #00d4ff;
            border-radius: 50%;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #00d4ff;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .decor-1 {
            top: 10%;
            left: 10%;
        }

        .decor-2 {
            bottom: 10%;
            right: 10%;
            animation-direction: reverse;
        }
    </style>
</head>
<body>
    <div class="outro-container">
        <!-- 背景粒子 -->
        <div class="particles" id="particles"></div>

        <!-- 装饰圆环 -->
        <div class="logo-decor decor-1"></div>
        <div class="logo-decor decor-2"></div>

        <!-- 扫描线 -->
        <div class="scanline"></div>

        <!-- 主标题 -->
        <div class="thank-you">感谢观看</div>

        <!-- 域名链接（可点击） -->
        <a href="https://pengworks.com" target="_blank" class="domain-link">
            🌐 pengworks.com
        </a>

        <!-- 行动号召 -->
        <div class="cta">
            <span class="cta-item"><span class="emoji">👍</span> 点赞</span>
            <span class="cta-item"><span class="emoji">⭐</span> 收藏</span>
            <span class="cta-item"><span class="emoji">➕</span> 关注</span>
        </div>
    </div>

    <script>
        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
            particle.style.opacity = Math.random() * 0.5 + 0.3;
            particlesContainer.appendChild(particle);
        }

        // 点击域名跳转
        document.querySelector('.domain-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.open('https://pengworks.com', '_blank');
        });
    </script>
</body>
</html>
