<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓬碰鹏 | 视频创作者</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-logo">蓬碰鹏</div>
        <div class="nav-links">
            <a href="#about">关于</a>
            <a href="#works">作品</a>
            <a href="#news">动态</a>
            <a href="#contact">联系</a>
        </div>
    </nav>

    <!-- Hero 区 -->
    <section class="hero" id="hero">
        <div class="hero-bg"></div>
        
        <!-- ✅ 赛博科幻动画（左下 + 右上） -->
        <video class="hero-anim hero-anim-left" autoplay loop muted playsinline>
            <source src="videos/cyber-left.mp4" type="video/mp4">
        </video>
        <video class="hero-anim hero-anim-right" autoplay loop muted playsinline>
            <source src="videos/cyber-right.mp4" type="video/mp4">
        </video>
        
        <div class="hero-content">
            <div class="hero-tag">VIDEO CREATOR</div>
            <h1 class="hero-title">
                <span class="hero-line">用镜头</span>
                <span class="hero-line gradient-text">讲述故事</span>
            </h1>
            <p class="hero-desc" id="heroDesc">专注于游戏视频创作 · 剪辑 · AI视频制作</p>
            <div class="hero-actions">
                <a href="#works" class="btn btn-primary">浏览作品</a>
                <a href="#contact" class="btn btn-secondary">联系我</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- 关于我 -->
    <section class="section" id="about">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">ABOUT</span>
                <h2 class="section-title">关于我</h2>
            </div>
            <div class="about-grid">
                <div class="about-text">
                    <p class="about-lead" id="aboutLead"></p>
                    <p id="aboutBio1"></p>
                    <p id="aboutBio2"></p>
                    <div class="about-stats" id="aboutStats">
                        <!-- 统计数据由JS动态加载 -->
                    </div>
                </div>
                <div class="about-profile">
                    <div class="profile-card">
                        <img src="images/avatar.png" class="profile-avatar" alt="蓬碰鹏">
                        <h3 id="profileName">蓬碰鹏</h3>
                        <p class="profile-title" id="profileTitle">老鹏 · 视频创作者 / AI探索者</p>
                        <div class="profile-details">
                            <div class="profile-item">
                                <span class="profile-label">🎮 主力游戏</span>
                                <span id="profileGames"></span>
                            </div>
                            <div class="profile-item">
                                <span class="profile-label">🛠️ 常用工具</span>
                                <span id="profileTools"></span>
                            </div>
                            <div class="profile-item">
                                <span class="profile-label">🤖 AI技能</span>
                                <span id="profileAISkills"></span>
                            </div>
                            <div class="profile-item">
                                <span class="profile-label">📋 剪辑原则</span>
                                <span id="profilePrinciples"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 作品展示 -->
    <section class="section section-dark" id="works">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">WORKS</span>
                <h2 class="section-title">精选作品</h2>
            </div>
            <div class="works-grid" id="worksGrid">
                <!-- 作品由JS动态加载 -->
            </div>
        </div>
    </section>

    <!-- 游戏科技动态 -->
    <section class="section" id="news">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">NEWS</span>
                <h2 class="section-title">游戏科技动态</h2>
            </div>
            <div class="news-grid" id="newsGrid">
                <!-- 新闻由JS动态加载 -->
                <div class="news-loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载最新动态...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系我 -->
    <section class="section section-dark" id="contact">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">CONTACT</span>
                <h2 class="section-title">联系我</h2>
            </div>
            <div class="contact-content">
                <p class="contact-desc">有合作意向或想交流视频创作？欢迎随时联系。</p>
                <div class="contact-links" id="contactLinks">
                    <!-- 联系方式由JS动态加载 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p id="footerText">© 2025 蓬碰鹏（老鹏）· 用心创作每一帧</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
